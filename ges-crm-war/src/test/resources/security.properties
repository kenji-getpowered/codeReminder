#######################
# Fichier de configuration des services d'authentification
#######################
#
# L'authentification Novell est active selon l'URL utilisée.
# L'authentification GEF 2 est désactivable.
# L'authentification LDAP est toujours requise.
#
#######################
#
# Configuration GEF2
#
# Toutes les clés doivent être présentes.
# Des valeurs correctes sont nécessaires si GEF2 est activé.
#

# Activation de l'authentification sur GEF2
gef2.enable=true

# Fichier de clé GEF2
gef2.keyfile=keyfile.dat
# Adresse du webService GEF2
gef2.url=http://auth.int.groupe.generali.fr/services/IJetonService2

## Application à utiliser
#gef2.application.id=37
#gef2.application.libelle=GES-CRM

## Annuaire à utiliser
gef2.annuaire.id=5
gef2.annuaire.libelle=LDAP NDS
#
##
## Configuration LDAP (requise)
##
ldap.url=ldap://ldap-int.groupe.generali.fr:389
ldap.userDn='cn={0},ou=USERS,o=GENERALI'